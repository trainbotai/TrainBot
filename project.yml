name: TrainBot
options:
  bundleIdPrefix: com.luca.trainbot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: ro
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: RK92XXY52G
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ASSETCATALOG_COMPILER_PERFORM_THINNING: NO

targets:
  TrainBot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrainBot
    resources:
      - path: TrainBot/Assets.xcassets
      - path: TrainBot/Core/Storage/TrainBot.xcdatamodeld
    info:
      path: TrainBot/Info.plist
      properties:
        CFBundleDisplayName: TrainBot
        UILaunchScreen:
          UIColorName: PrimaryPurple
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "TrainBot foloseste camera pentru a face poze de antrenament pentru AI-ul tau."
        NSPhotoLibraryUsageDescription: "TrainBot acceseaza galeria pentru a importa poze de antrenament."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.luca.trainbot.TrainBot
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic

  TrainBotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrainBotTests
    dependencies:
      - target: TrainBot
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TrainBot.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TrainBot"

  TrainBotUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrainBotUITests
    dependencies:
      - target: TrainBot

schemes:
  TrainBot:
    build:
      targets:
        TrainBot: all
        TrainBotTests: [test]
        TrainBotUITests: [test]
    test:
      targets:
        - TrainBotTests
        - TrainBotUITests
    run:
      config: Debug
    archive:
      config: Release
