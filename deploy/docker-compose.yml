services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trainbot_prod
      POSTGRES_USER: trainbot
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainbot -d trainbot_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [trainbot]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/var/uploads/trainbot
    networks: [trainbot]

  caddy:
    build: ./caddy
    restart: unless-stopped
    ports:
      - "33443:33443"
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks: [trainbot]

networks:
  trainbot:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
